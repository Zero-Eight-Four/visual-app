server {
    listen 80;
    server_name localhost;

    # 增加上传文件大小限制
    client_max_body_size 512M;

    # 重定向根路径到 /robot-dog-web/
    location = / {
        return 301 /robot-dog-web/;
    }

    # 前端静态文件
    location /robot-dog-web {
        alias /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /robot-dog-web/index.html;
    }

    # SSE Endpoint - Specific configuration
    location /api/events {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Accel-Buffering no;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 24h;
    }

    # 后端 API 代理
    location /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 地图文件代理
    location /maps {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 图片文件代理
    location /images {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 视频文件代理 (assuming videos are also served by backend, though not explicit in server.js snippet I saw, but usually safer to proxy if backend manages them)
    # Checking existing nginx.conf... it doesn't have /videos proxy.
    # But server.js might serve them? 
    # Let's stick to existing nginx.conf structure.
}
