services:
  backend:
    image: registry.cn-hangzhou.aliyuncs.com/zjyp/java-app:visual-app-backend
    restart: always
    environment:
      - NODE_ENV=production
    volumes:
      # 数据持久化目录 (Data persistence)
      - ./data/maps:/app/maps
      - ./data/image:/app/image
      - ./data/videos:/app/videos
      - ./data/temp:/app/temp
      
      # 配置文件持久化 (Config persistence)
      # 建议首次部署使用 named volume 保留镜像内的配置，
      # 后续如果有修改需求，可以 cp 出来后改为 bind mount
      - app_config:/app/config
      
      # 共享前端静态资源给 Nginx (Share static files)
      - static_volume:/app/dist
    deploy:
      resources:
        limits:
          memory: 4G

  nginx:
    # 使用搬运到阿里云的镜像，避免服务器连接 DockerHub 失败
    image: registry.cn-hangzhou.aliyuncs.com/zjyp/java-app:nginx-alpine
    restart: always
    ports:
      - "8080:80" # 修改为 8080 端口，避免与服务器现有 80 端口冲突
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/usr/share/nginx/html
    depends_on:
      - backend

volumes:
  static_volume:
  app_config:
